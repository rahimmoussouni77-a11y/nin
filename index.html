<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CURA SPACE | Creative Studio & Café</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body onload="CuraApp.init()">

<header class="app-header">
    <div class="logo-container">
        <img src="logo.jpg" alt="Cura Logo" class="main-logo">
        <div class="brand-name">CURA<span>SPACE</span></div>
    </div>

    <nav class="main-nav">
        <button class="nav-item active" onclick="Router.switch('cafe')">
            <i class="fas fa-mug-hot"></i> المقهى
        </button>
        <button class="nav-item" onclick="Router.switch('studio')">
            <i class="fas fa-wand-magic-sparkles"></i> الاستوديو
        </button>
    </nav>

    <div class="header-right">
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-bag"></i>
            <span id="cart-qty">0</span>
        </div>
    </div>
</header>

<main class="container">
    <section id="cafe-section">
        <h2 class="section-title">Menu du Café</h2>
        <div id="cafe-items-grid" class="items-grid">
        </div>
    </section>

    <aside id="cart-panel" class="cart-sidebar">
        <h3>Votre Commande (طلباتك)</h3>
        <div id="cart-summary"></div>
        <div class="cart-total">
            <span>Total:</span>
            <span id="total-val">0</span> DA
        </div>
        <button class="checkout-btn">تأكيد الطلب</button>
    </aside>
</main>

<script src="script.js"></script>
</body>
</html>
